<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Homarr iFrames Ping</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
      }

      body {
        margin: 0;
        display: grid;
        place-items: center;
        padding: 18px;
        background: #f2f4f8;
        color: #111827;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 760px);
        border: 4px solid #18a058;
        border-radius: 8px;
        padding: clamp(16px, 5vw, 32px);
        background: #ffffff;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        color: #0b7a3b;
        font-size: clamp(24px, 8vw, 52px);
        line-height: 1;
      }

      p {
        margin-top: 12px;
        font-size: clamp(14px, 3.5vw, 20px);
        line-height: 1.35;
      }

      code {
        overflow-wrap: anywhere;
        color: #0f3f8f;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>IFRAME PING OK</h1>
      <p>This page uses no JavaScript. If this shows in Homarr, the iframe can render <code>homarr-iframes:8080</code>.</p>
      <p>Next test: <code>http://homarr-iframes:8080/debug/</code></p>
    </main>
  </body>
</html>
