services:
  homarr-iframes:
    build: .
    container_name: homarr-iframes
    restart: unless-stopped
    environment:
      PORT: 8080
      FRAME_ANCESTORS: ""
      GEOIP_PROVIDER: "ipapi"
      DASHDOT_URL: "http://dashdot:3001"
      WIDGET_PUBLIC_BASE_URL: "http://${WIDGET_BIND_IP}:8096"
    ports:
      - "${WIDGET_BIND_IP:?Set WIDGET_BIND_IP in .env to your private VPS IP}:8096:8080"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8080/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      services:
        aliases:
          - homarr-iframes
          - custom-widgets
          - homarr-custom-widgets

networks:
  services:
    external: true
